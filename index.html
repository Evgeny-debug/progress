<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BV Jewelry | Project Dashboard Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --accent: #d4af37; --text: #ffffff; --muted: #8e8e93;
            --border: rgba(255, 255, 255, 0.1); --gold-grad: linear-gradient(135deg, #fbf2c6 0%, #d4af37 35%, #b68d40 60%, #fbf2c6 100%);
            --danger: #ff453a; --success: #32d74b;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        header { padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000; }
        .logo { display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .logo span:first-child { font-family: 'Playfair Display', serif; font-size: 22px; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .logo span:last-child { font-size: 7px; color: var(--text); letter-spacing: 5px; opacity: 0.7; }
        .tabs-nav { display: flex; gap: 8px; background: var(--card); padding: 5px; border-radius: 12px; border: 1px solid var(--border); }
        .tab-btn { padding: 8px 14px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.3s; border: none; color: var(--muted); background: transparent; text-transform: uppercase; }
        .tab-btn.active { background: var(--border); color: var(--accent); }
        main { padding: 30px 6% 100px; max-width: 900px; margin: 0 auto; }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; position: relative; }
        .sync-status { position: absolute; top: 15px; right: 20px; font-size: 9px; text-transform: uppercase; color: var(--muted); font-weight: 800; }
        .balance-val { font-size: 50px; font-weight: 700; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
        .progress-container { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; margin: 20px 0; overflow: hidden; border: 1px solid var(--border); }
        .progress-fill { height: 100%; background: var(--gold-grad); width: 0%; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .del-btn { background: transparent; border: none; color: var(--danger); opacity: 0.3; cursor: pointer; padding: 5px; font-size: 14px; transition: 0.3s; }
        .del-btn:hover { opacity: 1; transform: scale(1.2); }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        .btn-plus { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; transition: 0.3s; }
        .btn-plus:hover { opacity: 0.8; }
        .task-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .checkbox { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 5px; flex-shrink: 0; position: relative; cursor: pointer; }
        .task-item.done .checkbox { background: var(--accent); border-color: var(--accent); }
        .task-item.done .checkbox::after { content: '✓'; position: absolute; color: #000; left: 3px; top: -1px; font-weight: 900; }
        .task-item.done span { color: var(--muted); text-decoration: line-through; }
        .rate-info { font-size: 11px; color: var(--success); margin-bottom: 20px; }
        .task-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo"><span>BV</span><span>JEWELRY</span></a>
    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('tasks', this)">📂 Прогрес</button>
        <button class="tab-btn" onclick="switchTab('budget', this)">💰 Бюджет ($)</button>
    </nav>
</header>

<main>
    <div id="tasksView" class="view active">
        <div class="card" style="text-align: center">
            <span class="sync-status" id="syncStatusTasks">Підключення...</span>
            <span style="font-size: 11px; color: var(--muted); letter-spacing: 1px">ВИКОНАННЯ ТЕХЗАВДАННЯ</span>
            <div id="overallPerc" style="font-size: 40px; font-weight: 700; margin: 10px 0">0%</div>
            <div class="progress-container"><div class="progress-fill" id="progBar"></div></div>
        </div>
        
        <div class="card">
            <b>🎨 Front-end</b>
            <div class="input-row" style="display:flex; gap:10px; margin-top:15px">
                <input type="text" id="feInput" placeholder="Нове завдання...">
                <button onclick="addTask('fe')" style="width:40px; height:42px; border-radius:10px; background:var(--accent); border:none; font-weight:700; cursor:pointer">+</button>
            </div>
            <div id="feList"></div>
        </div>

        <div class="card">
            <b>⚙️ Back-end</b>
            <div class="input-row" style="display:flex; gap:10px; margin-top:15px">
                <input type="text" id="beInput" placeholder="Нове завдання...">
                <button onclick="addTask('be')" style="width:40px; height:42px; border-radius:10px; background:var(--accent); border:none; font-weight:700; cursor:pointer">+</button>
            </div>
            <div id="beList"></div>
        </div>
    </div>

    <div id="budgetView" class="view">
        <div class="card" style="text-align: center">
            <span class="sync-status" id="syncStatusBudget">Підключення...</span>
            <span style="font-size: 11px; color: var(--muted); letter-spacing: 1.5px">БАЛАНС В USD (ПОТОЧНИЙ КУРС)</span>
            <div class="balance-val" id="currentBalance">$0.00</div>
            <div class="rate-info" id="rateVal">Оновлення курсу...</div>
            <div class="progress-container"><div class="progress-fill" id="moneyBar"></div></div>
            <div id="moneyPerc" style="font-size: 13px; font-weight: 700; color: var(--accent)">0% від цілі $1500</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
            <div class="card" style="margin: 0">
                <input type="number" id="incVal" placeholder="Гривні +">
                <input type="text" id="incNote" placeholder="Коментар">
                <button onclick="addMoney('income')" class="btn-plus" style="background: var(--success); color: #fff">ДОХІД</button>
            </div>
            <div class="card" style="margin: 0">
                <input type="number" id="expVal" placeholder="Гривні -">
                <input type="text" id="expNote" placeholder="Коментар">
                <button onclick="addMoney('expense')" class="btn-plus" style="background: var(--danger); color: #fff">ВИТРАТА</button>
            </div>
        </div>

        <div class="card"><b style="display: block; margin-bottom: 20px; font-size: 12px">ЖУРНАЛ ОПЛАТ (UAH)</b><div id="histContent"></div></div>
    </div>
</main>

<footer>BV Jewelry Cloud Dashboard v4.2</footer>

<script>
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxBwebL5EnRNPDdhyjgpAATUFUtOWKnEH1O4CBoWR2gcLhe3LkYYgwnG8s9di6qAvUYtA/exec';
    
    let usdRate = 39.8; 
    let state = {
        goal: 1500,
        transactions: [],
        feTasks: [],
        beTasks: []
    };

    async function syncCloud(data = null) {
        document.querySelectorAll('.sync-status').forEach(el => el.innerText = 'Синхронізація...');
        try {
            if (data) {
                // Відправляємо дані
                await fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                document.querySelectorAll('.sync-status').forEach(el => el.innerText = 'Збережено');
            } else {
                // Отримуємо дані
                const res = await fetch(SHEET_URL);
                const cloudData = await res.json();
                if (cloudData && Object.keys(cloudData).length > 0) state = cloudData;
                document.querySelectorAll('.sync-status').forEach(el => el.innerText = 'Хмара: OK');
            }
        } catch (e) {
            document.querySelectorAll('.sync-status').forEach(el => el.innerText = 'Помилка');
        }
        renderAll();
    }

    async function updateRate() {
        try {
            const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
            const d = await res.json();
            usdRate = d.rates.UAH;
            document.getElementById('rateVal').innerText = `Курс сьогодні: 1$ = ${usdRate.toFixed(2)} грн`;
            renderAll();
        } catch(e) {}
    }

    function renderAll() {
        renderTasks();
        renderFinance();
    }

    window.addTask = (type) => {
        const input = document.getElementById(type + 'Input');
        if(!input.value.trim()) return;
        state[type + 'Tasks'].push({ text: input.value.trim(), done: false });
        input.value = ''; syncCloud(state);
    }

    window.delTask = (type, i) => {
        if(confirm('Видалити це завдання?')) {
            state[type+'Tasks'].splice(i, 1);
            syncCloud(state);
        }
    }

    function renderTasks() {
        const draw = (tasks, id, type) => {
            const cont = document.getElementById(id); if(!cont) return 0;
            cont.innerHTML = ''; let done = 0;
            tasks.forEach((t, i) => {
                if(t.done) done++;
                cont.innerHTML += `
                    <div class="task-item ${t.done ? 'done' : ''}">
                        <div class="checkbox" onclick="toggleT('${type}', ${i})"></div>
                        <span onclick="toggleT('${type}', ${i})">${t.text}</span>
                        <div class="task-actions">
                            <button class="del-btn" onclick="delTask('${type}', ${i})">✕</button>
                        </div>
                    </div>`;
            });
            return done;
        }
        const fD = draw(state.feTasks || [], 'feList', 'fe');
        const bD = draw(state.beTasks || [], 'beList', 'be');
        const total = (state.feTasks?.length || 0) + (state.beTasks?.length || 0);
        const p = total > 0 ? Math.round(((fD + bD) / total) * 100) : 0;
        document.getElementById('overallPerc').innerText = p + '%';
        document.getElementById('progBar').style.width = p + '%';
    }

    window.toggleT = (type, i) => { 
        state[type+'Tasks'][i].done = !state[type+'Tasks'][i].done; 
        syncCloud(state); 
    }

    window.addMoney = (type) => {
        const v = document.getElementById(type==='income'?'incVal':'expVal');
        const n = document.getElementById(type==='income'?'incNote':'expNote');
        if(!v.value) return;
        state.transactions.unshift({ 
            type, 
            uah: parseFloat(v.value), 
            note: n.value || (type==='income'?'Дохід':'Витрата'), 
            date: new Date().toLocaleDateString() 
        });
        v.value = ''; n.value = ''; syncCloud(state);
    }

    window.delTrans = (i) => {
        if(confirm('Видалити цю транзакцію?')) {
            state.transactions.splice(i, 1);
            syncCloud(state);
        }
    }

    function renderFinance() {
        let uahBal = 0; const cont = document.getElementById('histContent'); if(!cont) return;
        cont.innerHTML = '';
        (state.transactions || []).forEach((t, i) => {
            uahBal += (t.type === 'income' ? t.uah : -t.uah);
            cont.innerHTML += `
                <div class="history-item">
                    <span><b>${t.note}</b><br><small style="color:var(--muted)">${t.date}</small></span>
                    <div style="display:flex; align-items:center; gap:12px">
                        <b style="color:var(--${t.type==='income'?'success':'danger'})">${t.type==='income'?'+':'-'}${t.uah} грн</b>
                        <button onclick="delTrans(${i})" class="del-btn">✕</button>
                    </div>
                </div>`;
        });
        const usdBal = uahBal / usdRate;
        document.getElementById('currentBalance').innerText = `$${usdBal.toFixed(2)}`;
        const p = Math.round((usdBal / state.goal) * 100) || 0;
        document.getElementById('moneyBar').style.width = Math.min(100, Math.max(0, p)) + '%';
        document.getElementById('moneyPerc').innerText = `${p}% від цілі $1500`;
    }

    window.switchTab = (t, b) => {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(t+'View').classList.add('active'); b.classList.add('active');
    }

    // Старт
    updateRate();
    syncCloud(); 
</script>

</body>
</html>
